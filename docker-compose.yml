services:
  backend-api:
    build: 
      context: ./backend
      dockerfile: src/SmartHome.Api/Dockerfile
    ports:
      - "5000:8080"
    volumes:
      - ./data:/app/data

  frontend-ui:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend-api